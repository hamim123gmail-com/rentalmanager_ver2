<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RentManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="text-center mb-4">
                <h1 class="fw-bold" style="color: #2C3E50;">
                    <i class="fas fa-building me-2"></i>RentManager
                </h1>
            </div>

            <!-- Title changes based on role -->
            <h2 id="login-title">Login</h2>
            <p class="subtitle" id="login-subtitle">Welcome back!</p>

            <!-- Alert -->
            <div id="alert-container"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" class="form-control" id="email"
                            placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" class="form-control" id="password"
                            placeholder="Enter your password" required>
                        <button class="btn btn-outline-secondary" type="button"
                            onclick="togglePassword()">
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3" id="login-btn">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>

                <div class="text-center">
                    <a href="index.html" class="text-muted text-decoration-none">
                        <i class="fas fa-arrow-left me-1"></i>Back to Home
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        // Get role from URL
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'tenant';

        // Update page based on role
        if (role === 'owner') {
            document.getElementById('login-title').textContent = 'Owner Login';
            document.getElementById('login-subtitle').textContent = 'Access your property management dashboard';
            document.getElementById('login-btn').classList.replace('btn-primary', 'btn-dark');
        } else {
            document.getElementById('login-title').textContent = 'Tenant Login';
            document.getElementById('login-subtitle').textContent = 'Access your tenant dashboard';
        }

        // Handle login form submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

            try {
                const data = await authAPI.login(email, password, role);
                saveAuth(data.token, data.user);

                showAlert('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    if (role === 'owner') {
                        window.location.href = 'owner/dashboard.html';
                    } else {
                        window.location.href = 'tenant/dashboard.html';
                    }
                }, 1000);

            } catch (error) {
                showAlert(error.message, 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Login';
            }
        });

        // Toggle password visibility
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
