<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="landing-hero">
        <div class="container">
            <!-- Header -->
            <div class="text-center text-white mb-5">
                <h1 class="display-4 fw-bold mb-3">
                    <i class="fas fa-building me-3"></i>RentManager
                </h1>
                <p class="lead opacity-75">
                    A smart platform for tenants and property owners
                </p>
            </div>

            <!-- Portal Cards -->
            <div class="row justify-content-center g-4">
                <!-- Tenant Portal -->
                <div class="col-md-4">
                    <div class="portal-card" onclick="window.location.href='login.html?role=tenant'">
                        <div class="icon">🏠</div>
                        <h3>Tenant Portal</h3>
                        <p>View your rent status, payment history and submit maintenance requests</p>
                        <button class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Login as Tenant
                        </button>
                    </div>
                </div>

                <!-- Owner Portal -->
                <div class="col-md-4">
                    <div class="portal-card" onclick="window.location.href='login.html?role=owner'">
                        <div class="icon">🏢</div>
                        <h3>Owner Portal</h3>
                        <p>Manage your properties, tenants, payments and maintenance requests</p>
                        <button class="btn btn-dark w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Login as Owner
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center text-white mt-5 opacity-50">
                <small>© 2024 RentManager. All rights reserved.</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
